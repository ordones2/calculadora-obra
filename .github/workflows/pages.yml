name: Deploy to GitHub Pages

# Publica o app estático (HTML/CSS/JS na raiz) no GitHub Pages.
# Roda neste branch de desenvolvimento para validar a interface antes do merge,
# e também na main.

on:
  push:
    branches:
      - claude/construction-cost-calculator-spec-hg8tmr
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (habilita se necessário)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact (raiz do repositório)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
